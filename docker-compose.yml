# Full stack: Postgres + poller + API. Brings the service up from a clean clone
# with `docker compose up --build`. The database persists in a named volume
# across restarts; the API listens on http://localhost:8000.

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # The DB port is intentionally NOT published to the host: the API (port 8000)
    # is the only public interface, and publishing 5432 would clash on any machine
    # already running Postgres there. Run the analysis skills inside the stack
    # (`docker compose exec api python .cursor/skills/.../*.py`). To reach the DB
    # from the host, add a mapping, e.g.  ports: ["5433:5432"].
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  poller:
    build: .
    command: python -m app.poller
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
