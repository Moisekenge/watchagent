# Full stack: Postgres + poller + API. Brings the service up from a clean clone
# with `docker compose up --build`. The database persists in a named volume
# across restarts; the API listens on http://localhost:8000.

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Published so the data-analysis skill can be run from the host. If you
      # already run Postgres locally on 5432, change the host side (e.g. 5433:5432).
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  poller:
    build: .
    command: python -m app.poller
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
